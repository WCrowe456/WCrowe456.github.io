<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="card">
    <!-- Top bar -->
    <div class="topbar">
      <button title="Home">
        <svg viewBox="0 0 24 24">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z" />
        </svg>
      </button>
      <button title="Share">
        <svg viewBox="0 0 24 24">
          <path
            d="M18 16c-.79 0-1.5.31-2.03.81L7.91 12.7A3.3 3.3 0 0 0 8 12c0-.24-.03-.47-.09-.7l7.97-4.06A2.99 2.99 0 0 0 18 8a3 3 0 1 0-3-3c0 .24.03.47.09.7L7.12 9.76A3 3 0 0 0 6 9a3 3 0 1 0 3 3c0-.24-.03-.47-.09-.7l7.97-4.06c.48.43 1.12.76 1.88.76A3 3 0 1 0 18 16z" />
        </svg>
      </button>
    </div>

    <!-- Profile -->
    <div class="profile">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Speech bubble icon simplified -->
            <rect x="6" y="8" width="48" height="34" rx="6" fill="white" />
            <polygon points="14,42 8,54 26,42" fill="white" />
            <text x="30" y="30" text-anchor="middle" dominant-baseline="middle" font-family="Bebas Neue,sans-serif"
              font-size="14" fill="#2db84e" letter-spacing="1">WEB</text>
            <text x="30" y="44" text-anchor="middle" dominant-baseline="middle" font-family="Bebas Neue,sans-serif"
              font-size="14" fill="#2db84e" letter-spacing="1">TOON</text>
          </svg>
        </div>
      </div>
      <h1>WEBTOON</h1>
      <p>Read the world's largest collection of digital comics and find your next story.</p>
    </div>

    <!-- Socials -->
    <div class="socials">
      <a href="#" title="Facebook">
        <svg viewBox="0 0 24 24">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
        </svg>
      </a>
      <a href="#" title="YouTube">
        <svg viewBox="0 0 24 24">
          <path
            d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58zM9.75 15.02V8.98L15.5 12l-5.75 3.02z" />
        </svg>
      </a>
      <a href="#" title="Instagram">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" fill="#2db84e" />
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#2db84e" stroke-width="2" stroke-linecap="round" />
        </svg>
      </a>
      <a href="#" title="X / Twitter">
        <svg viewBox="0 0 24 24">
          <path
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
        </svg>
      </a>
    </div>

    <!-- Links -->
    <div class="links">
      <a href="#" class="link-btn">
        <span class="icon">📖</span>
        <span class="label">Read WEBTOON Originals</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </a>
      <a href="#" class="link-btn">
        <span class="icon">🎨</span>
        <span class="label">Discover New Creators on CANVAS</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </a>
      <a href="#" class="link-btn">
        <span class="icon">🛍️</span>
        <span class="label">Shop Official Merch</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </a>
      <a href="#" class="link-btn">
        <span class="icon">📱</span>
        <span class="label">Download the App</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </a>
    </div>

    <div class="footer">Made with <strong>Linktree</strong> · linktr.ee/webtoon</div>
  </div>
</body>

</html>
